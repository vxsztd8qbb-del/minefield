<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>💣 MINEFIELD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
:root{
  --bg:#080810;--surface:#0d0d1f;--border:#1e1e3f;--text:#e2e8f0;
  --accent:#f59e0b;--danger:#ef4444;--ok:#4ade80;--dim:#555;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;overflow-x:hidden;-webkit-text-size-adjust:100%;}
body{display:flex;flex-direction:column;align-items:center;}

.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:680px;padding:16px 12px 40px;}
.screen.active{display:flex;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 16px;width:100%;margin-bottom:12px;}

.logo{font-size:56px;text-align:center;line-height:1;margin-bottom:8px;}
.big-title{font-size:clamp(26px,8vw,40px);font-weight:900;letter-spacing:5px;text-align:center;color:#fff;}
.subtitle{color:var(--dim);font-size:12px;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-top:4px;}
h3.section{color:var(--accent);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;margin-top:0;}

.btn{
  display:block;width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;
  padding:16px;font-size:15px;font-weight:900;letter-spacing:2px;cursor:pointer;text-align:center;
  font-family:'Courier New',monospace;margin-top:12px;
  -webkit-appearance:none;appearance:none;
}
.btn.outline{background:transparent;color:var(--accent);border:2px solid var(--accent);}
.btn.small{padding:11px 20px;font-size:13px;width:auto;display:inline-block;margin-top:0;}
.btn-back{background:transparent;color:#666;border:none;cursor:pointer;font-family:inherit;font-size:14px;padding:6px 0;margin-bottom:8px;text-align:left;-webkit-appearance:none;}

.diff-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.diff-btn{
  background:transparent;border:1px solid #2a2a4e;border-radius:8px;color:#888;
  padding:12px 4px;cursor:pointer;font-size:13px;text-align:center;font-family:inherit;
  -webkit-appearance:none;appearance:none;
}
.diff-btn small{display:block;font-size:10px;color:#444;margin-top:3px;}
.diff-btn.on{border-color:var(--accent);color:var(--accent);background:#1a1200;}
.diff-btn.on small{color:#7a5500;}

.row{display:flex;gap:8px;margin-bottom:8px;align-items:stretch;}
input[type=text]{
  flex:1;background:#111122;border:1px solid #2a2a4e;border-radius:8px;
  color:#fff;padding:12px 14px;font-size:16px;font-family:'Courier New',monospace;
  outline:none;-webkit-appearance:none;appearance:none;min-width:0;
}
.err{color:var(--danger);font-size:12px;margin:2px 0 8px;min-height:16px;}

.player-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.p-slot{border:1px solid;border-radius:8px;padding:8px 12px;font-size:13px;
  display:flex;flex-direction:column;gap:2px;position:relative;min-width:90px;}
.p-slot .x{position:absolute;top:5px;right:8px;background:none;border:none;
  color:#555;cursor:pointer;font-size:15px;padding:2px;font-family:inherit;-webkit-appearance:none;}

.topbar{display:flex;justify-content:space-between;align-items:center;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;width:100%;}
.timer{font-size:14px;color:#666;}

.strip{display:flex;flex-wrap:wrap;gap:6px;width:100%;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;}
.p-chip{border:1px solid;border-radius:7px;padding:6px 10px;font-size:12px;
  display:flex;flex-direction:column;gap:1px;min-width:60px;}
.p-chip.out{opacity:.35;}
.p-chip.out span:first-child{text-decoration:line-through;}
.turn-lbl{font-size:9px;}

#turn-banner{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;text-align:center;font-size:14px;display:none;
}

#result-box{
  display:none;width:100%;background:#0d0d1a;border:1px solid var(--border);
  border-radius:12px;padding:20px;text-align:center;flex-direction:column;align-items:center;gap:8px;
}

#grid-scroll{width:100%;overflow:auto;-webkit-overflow-scrolling:touch;}
#grid{display:inline-grid;gap:2px;padding:8px;}
.cell{
  display:flex;align-items:center;justify-content:center;border-radius:3px;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  font-weight:800;border:1px solid #2d2d4e;background:#1a1a2e;
  box-shadow:inset 0 1px 0 #3d3d6e;
}
.cell.done{background:#0f172a;border-color:#0f172a;box-shadow:none;cursor:default;}
.cell.flagged{background:#1e1b4b;border-color:#3b3880;}
.cell.boom{background:#7f1d1d;border-color:#7f1d1d;}
.cell.safe-mine{background:#1a2a1a;border-color:#2a4a2a;}

#log{width:100%;background:#0a0a15;border:1px solid #1a1a2e;border-radius:10px;
  padding:8px 12px;min-height:44px;font-size:11px;line-height:1.9;}

.hint{font-size:11px;color:#444;text-align:center;padding:2px 0;}

.stab{width:100%;border-collapse:collapse;}
.stab th{color:#555;font-size:10px;letter-spacing:2px;text-align:left;padding:4px 6px;border-bottom:1px solid #1a1a2e;}
.stab td{font-size:12px;padding:6px 6px;border-bottom:1px solid #0f0f1f;vertical-align:middle;}
.gold{color:#ffd700!important;font-weight:700;}
.silver{color:#c0c0c0!important;font-weight:700;}
.bronze{color:#cd7f32!important;font-weight:700;}
.pcard{background:#111122;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.pcard-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.arow{display:grid;grid-template-columns:44px 68px 52px 60px 1fr;
  font-size:11px;padding:4px 0;border-bottom:1px solid #1a1a2e;color:#888;gap:4px;}
.no-data{color:#555;font-size:13px;}
</style>
</head>
<body>

<!-- HOME -->
<div id="s-home" class="screen active">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding-top:40px;">
    <div class="logo">💣</div>
    <div class="big-title">MINEFIELD</div>
    <div class="subtitle">Multiplayer · Turn-Based · Elimination</div>
    <div style="width:100%;max-width:360px;margin-top:32px;">
      <button class="btn" id="btn-lobby">&#9654; NEW GAME</button>
      <button class="btn outline" id="btn-scores">&#127942; LEADERBOARD</button>
    </div>
    <div id="known-wrap" style="margin-top:24px;text-align:center;width:100%;max-width:360px;"></div>
    <p style="color:#333;font-size:10px;margin-top:32px;letter-spacing:1px;">Scores saved for this session</p>
  </div>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen">
  <button class="btn-back" id="lobby-back">&#8592; Back</button>
  <div class="card">
    <div class="big-title" style="font-size:22px;letter-spacing:3px;margin-bottom:4px;">GAME LOBBY</div>
    <div class="subtitle" style="margin-bottom:20px;">Add players &amp; pick difficulty</div>
    <h3 class="section">DIFFICULTY</h3>
    <div class="diff-row">
      <button class="diff-btn on" data-d="Easy">Easy<small>9&#215;9 &middot; 10 mines</small></button>
      <button class="diff-btn" data-d="Medium">Medium<small>16&#215;16 &middot; 40 mines</small></button>
      <button class="diff-btn" data-d="Hard">Hard<small>16&#215;30 &middot; 99 mines</small></button>
    </div>
    <h3 class="section">ADD PLAYERS</h3>
    <div class="row">
      <input type="text" id="name-in" placeholder="Player name..." maxlength="16" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
      <button class="btn small" id="add-btn" style="margin-top:0">ADD</button>
    </div>
    <div class="err" id="lobby-err"></div>
    <div class="player-list" id="plist"></div>
    <button class="btn" id="start-btn" style="display:none">&#128640; START GAME</button>
  </div>
</div>

<!-- GAME -->
<div id="s-game" class="screen" style="gap:7px;">
  <div class="topbar">
    <button class="btn-back" id="game-back" style="margin:0">&#8592; Lobby</button>
    <span style="font-weight:800;font-size:16px;color:var(--accent)">&#128163; MINEFIELD</span>
    <span class="timer" id="timer">&#9201; 0s</span>
  </div>
  <div class="strip" id="pstrip"></div>
  <div id="turn-banner"></div>
  <div id="result-box"></div>
  <div id="grid-scroll"><div id="grid"></div></div>
  <p class="hint">Tap = reveal &nbsp;&middot;&nbsp; Hold 0.5s = flag &#128681;</p>
  <div id="log"></div>
</div>

<!-- SCORES -->
<div id="s-scores" class="screen">
  <button class="btn-back" id="scores-back">&#8592; Back</button>
  <div class="big-title" style="font-size:20px;letter-spacing:3px;margin-bottom:14px;">&#127942; LEADERBOARD</div>
  <div class="card">
    <h3 class="section">GLOBAL TOP SCORES</h3>
    <div id="global-sc"></div>
  </div>
  <div class="card">
    <h3 class="section">PLAYER STATS</h3>
    <div id="player-sc"></div>
  </div>
</div>

<script>
// ── DATABASE (in-memory — iOS Safari blocks localStorage on local files) ──
var DB = { users:{}, globalScores:[] };
function ensureUser(n){ if(!DB.users[n]) DB.users[n]={attempts:[],highScore:null}; }

// ── CONSTANTS ──
var DIFFS = {
  Easy:  {rows:9,  cols:9,  mines:10},
  Medium:{rows:16, cols:16, mines:40},
  Hard:  {rows:16, cols:30, mines:99}
};
var P_COLORS = ['#f59e0b','#22d3ee','#f472b6','#a78bfa','#4ade80','#fb923c'];
var N_COLORS = ['','#3b82f6','#22c55e','#ef4444','#7c3aed','#b45309','#06b6d4','#fff','#6b7280'];

// ── STATE ──
var diff='Easy', lobby=[], active=[], elim=[], turn=0;
var grid=[], cfg=null, won=false, over=false, t0=0, tTimer=null, logs=[];
var lpTimer=null, lpTarget=null;

// ── NAV ──
function show(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ── WIRE BUTTONS ──
document.getElementById('btn-lobby').addEventListener('click', function(){
  lobby=[];
  renderLobby();
  show('s-lobby');
  renderKnown();
});
document.getElementById('btn-scores').addEventListener('click', function(){
  renderScores(); show('s-scores');
});
document.getElementById('lobby-back').addEventListener('click', function(){ show('s-home'); });
document.getElementById('scores-back').addEventListener('click', function(){ show('s-home'); });
document.getElementById('game-back').addEventListener('click', function(){
  if(!won&&!over&&grid.length){ if(!confirm('Leave current game?')) return; }
  clearInterval(tTimer); show('s-lobby');
});
document.getElementById('add-btn').addEventListener('click', addPlayer);
document.getElementById('name-in').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ e.preventDefault(); addPlayer(); }
});
document.getElementById('start-btn').addEventListener('click', startGame);

document.querySelectorAll('.diff-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    diff=btn.dataset.d;
    document.querySelectorAll('.diff-btn').forEach(function(b){ b.classList.remove('on'); });
    btn.classList.add('on');
  });
});

// ── HOME ──
function renderKnown(){
  var names=Object.keys(DB.users);
  var el=document.getElementById('known-wrap');
  if(!names.length){el.innerHTML='';return;}
  el.innerHTML='<p style="color:#555;font-size:11px;letter-spacing:2px;margin-bottom:8px">KNOWN PLAYERS</p>'
    +names.map(function(n){return '<span style="display:inline-block;background:#1a1a2e;border:1px solid #2a2a4e;border-radius:20px;padding:4px 12px;font-size:12px;margin:3px;color:#888">'+n+'</span>';}).join('');
}

// ── LOBBY ──
function addPlayer(){
  var inp=document.getElementById('name-in');
  var name=inp.value.trim();
  var err=document.getElementById('lobby-err');
  if(!name){err.textContent='Enter a name.';return;}
  if(lobby.find(function(p){return p.name.toLowerCase()===name.toLowerCase();})){err.textContent='Name already added.';return;}
  if(lobby.length>=6){err.textContent='Max 6 players.';return;}
  lobby.push({name:name,color:P_COLORS[lobby.length]});
  inp.value=''; err.textContent='';
  ensureUser(name);
  renderLobby();
  inp.focus();
}

function removeLobbyPlayer(i){
  lobby.splice(i,1);
  lobby.forEach(function(p,idx){p.color=P_COLORS[idx];});
  renderLobby();
}

function renderLobby(){
  var el=document.getElementById('plist');
  var btn=document.getElementById('start-btn');
  el.innerHTML=lobby.map(function(p,i){
    return '<div class="p-slot" style="border-color:'+p.color+'">'
      +'<span style="color:'+p.color+';font-weight:700">'+p.name+'</span>'
      +'<span style="font-size:10px;color:#555">Player '+(i+1)+'</span>'
      +'<button class="x" data-i="'+i+'">&#10005;</button>'
      +'</div>';
  }).join('');
  el.querySelectorAll('.x').forEach(function(b){
    b.addEventListener('click', function(){ removeLobbyPlayer(+b.dataset.i); });
  });
  btn.style.display=lobby.length?'block':'none';
  btn.textContent='START GAME ('+lobby.length+' player'+(lobby.length!==1?'s':'')+')';
}

// ── GAME SETUP ──
function startGame(){
  if(!lobby.length) return;
  cfg=Object.assign({},DIFFS[diff],{difficulty:diff});
  grid=makeGrid(cfg.rows,cfg.cols,cfg.mines);
  active=lobby.map(function(p){return Object.assign({},p);});
  elim=[]; turn=0; won=false; over=false; logs=[];
  t0=Date.now();
  clearInterval(tTimer);
  tTimer=setInterval(tickTimer,500);
  show('s-game');
  document.getElementById('result-box').style.display='none';
  document.getElementById('log').innerHTML='';
  document.getElementById('timer').textContent='0s';
  document.getElementById('turn-banner').style.display='block';
  renderStrip();
  renderTurnBanner();
  buildGrid();
}

function tickTimer(){
  if(won||over) return;
  document.getElementById('timer').textContent=Math.floor((Date.now()-t0)/1000)+'s';
}

// ── GRID GEN ──
function makeGrid(rows,cols,mines){
  var total=rows*cols, ms=new Set();
  while(ms.size<mines) ms.add(Math.floor(Math.random()*total));
  var g=[];
  for(var r=0;r<rows;r++){
    g[r]=[];
    for(var c=0;c<cols;c++){
      g[r][c]={mine:ms.has(r*cols+c),revealed:false,flagged:false,adj:0,boom:false};
    }
  }
  for(var r=0;r<rows;r++) for(var c=0;c<cols;c++){
    if(g[r][c].mine) continue;
    var n=0;
    for(var dr=-1;dr<=1;dr++) for(var dc=-1;dc<=1;dc++){
      var nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&g[nr][nc].mine) n++;
    }
    g[r][c].adj=n;
  }
  return g;
}

function flood(r,c){
  var rows=cfg.rows,cols=cfg.cols,stack=[[r,c]];
  while(stack.length){
    var pos=stack.pop(),cr=pos[0],cc=pos[1];
    if(cr<0||cr>=rows||cc<0||cc>=cols) continue;
    var cell=grid[cr][cc];
    if(cell.revealed||cell.flagged||cell.mine) continue;
    cell.revealed=true;
    if(cell.adj===0) for(var dr=-1;dr<=1;dr++) for(var dc=-1;dc<=1;dc++) stack.push([cr+dr,cc+dc]);
  }
}

function countRevealed(){ return grid.flat().filter(function(c){return c.revealed;}).length; }
function countSafe(){ return grid.flat().filter(function(c){return !c.mine;}).length; }

// ── BUILD GRID DOM ──
function buildGrid(){
  var rows=cfg.rows,cols=cfg.cols;
  var wrap=document.getElementById('grid');
  var scrollW=document.getElementById('grid-scroll').clientWidth||window.innerWidth-24;
  var cs=Math.max(22,Math.min(40,Math.floor((scrollW-20)/cols)));
  wrap.style.gridTemplateColumns='repeat('+cols+','+cs+'px)';
  wrap.innerHTML='';
  for(var r=0;r<rows;r++) for(var c=0;c<cols;c++){
    (function(row,col){
      var d=document.createElement('div');
      d.className='cell';
      d.style.width=d.style.height=cs+'px';
      d.style.fontSize=Math.max(9,cs-16)+'px';
      d.dataset.r=row; d.dataset.c=col;
      d.addEventListener('touchstart', onTS, {passive:true});
      d.addEventListener('touchend',   onTE, {passive:false});
      d.addEventListener('touchmove',  onTM, {passive:true});
      d.addEventListener('click', function(){ reveal(row,col); });
      d.addEventListener('contextmenu', function(e){ e.preventDefault(); flagCell(row,col); });
      wrap.appendChild(d);
    })(r,c);
  }
}

function cellEl(r,c){ return document.getElementById('grid').children[r*cfg.cols+c]; }

function paintCell(r,c){
  var d=cellEl(r,c); if(!d) return;
  var cell=grid[r][c];
  d.className='cell'; d.textContent=''; d.style.color='';
  if(cell.revealed){
    d.classList.add('done');
    if(cell.mine){ d.classList.add(cell.boom?'boom':'safe-mine'); d.textContent='💣'; }
    else if(cell.adj>0){ d.textContent=cell.adj; d.style.color=N_COLORS[cell.adj]; }
  } else if(cell.flagged){
    d.classList.add('flagged'); d.textContent='🚩';
  }
}

function paintAll(){ for(var r=0;r<cfg.rows;r++) for(var c=0;c<cfg.cols;c++) paintCell(r,c); }

// ── TOUCH ──
function onTS(e){
  var d=e.currentTarget;
  var row=+d.dataset.r, col=+d.dataset.c;
  lpTarget={r:row,c:col};
  lpTimer=setTimeout(function(){
    if(lpTarget){ flagCell(lpTarget.r,lpTarget.c); }
    lpTarget=null;
  },450);
}
function onTE(){ clearTimeout(lpTimer); lpTarget=null; }
function onTM(){ clearTimeout(lpTimer); lpTarget=null; }

// ── GAME LOGIC ──
function reveal(r,c){
  if(won||over) return;
  var cell=grid[r][c];
  if(cell.revealed||cell.flagged) return;
  var player=active[turn%active.length];
  var elapsed=Math.floor((Date.now()-t0)/1000);
  if(cell.mine){
    cell.revealed=true; cell.boom=true;
    paintCell(r,c);
    addLog(player,'💥 HIT A MINE',elapsed);
    var idx=turn%active.length;
    elim.push(active[idx]);
    active.splice(idx,1);
    renderStrip();
    if(active.length<=1){ endGame(active[0]||null,elapsed); }
    else { turn=turn%active.length; renderTurnBanner(); }
  } else {
    flood(r,c); paintAll();
    addLog(player,'Revealed ('+r+','+c+')',elapsed);
    if(countRevealed()>=countSafe()){ endGame(player,elapsed); }
    else { turn=(turn+1)%active.length; renderTurnBanner(); }
  }
}

function flagCell(r,c){
  if(won||over) return;
  var cell=grid[r][c];
  if(cell.revealed) return;
  cell.flagged=!cell.flagged;
  paintCell(r,c);
}

function endGame(winner,elapsed){
  clearInterval(tTimer); won=true;
  for(var r=0;r<cfg.rows;r++) for(var c=0;c<cfg.cols;c++){
    if(grid[r][c].mine&&!grid[r][c].revealed){ grid[r][c].revealed=true; paintCell(r,c); }
  }
  document.getElementById('turn-banner').style.display='none';
  var rb=document.getElementById('result-box');
  rb.style.display='flex';
  if(winner){
    var score=Math.max(1000-elapsed*2,100);
    rb.innerHTML='<div style="font-size:32px">🎉</div>'
      +'<div style="color:'+winner.color+';font-weight:800;font-size:20px">'+winner.name+' WINS!</div>'
      +'<div style="color:#888;font-size:13px">Score: <span style="color:var(--accent)">'+score+'</span> &middot; Time: '+elapsed+'s</div>'
      +'<div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center">'
      +'<button class="btn small" id="rb-play">Play Again</button>'
      +'<button class="btn small outline" id="rb-scores">View Scores</button>'
      +'</div>';
    document.getElementById('rb-scores').addEventListener('click',function(){ renderScores(); show('s-scores'); });
  } else {
    rb.innerHTML='<div style="color:var(--danger);font-weight:800;font-size:20px">💥 EVERYBODY LOST!</div>'
      +'<button class="btn small" id="rb-play" style="margin-top:12px">Play Again</button>';
  }
  document.getElementById('rb-play').addEventListener('click', function(){ show('s-lobby'); });
  saveResults(winner?winner.name:null, elapsed);
}

// ── UI ──
function renderStrip(){
  var cur=active.length?active[turn%active.length]:null;
  var h='';
  active.forEach(function(p){
    var it=!won&&!over&&cur&&p.name===cur.name;
    h+='<div class="p-chip'+(it?' active-turn':'')+'" style="border-color:'+p.color+';'+(it?'background:'+p.color+'22':'')+'">'
      +'<span style="color:'+p.color+'">'+p.name+'</span>'
      +(it?'<span class="turn-lbl" style="color:'+p.color+'">&#9668; YOUR TURN</span>':'')
      +'</div>';
  });
  elim.forEach(function(p){
    h+='<div class="p-chip out" style="border-color:#333">'
      +'<span style="color:#555">'+p.name+'</span>'
      +'<span style="color:var(--danger);font-size:9px">&#128162; OUT</span>'
      +'</div>';
  });
  document.getElementById('pstrip').innerHTML=h;
}

function renderTurnBanner(){
  var el=document.getElementById('turn-banner');
  if(!active.length||won||over){el.style.display='none';return;}
  var p=active[turn%active.length];
  el.style.borderColor=p.color; el.style.display='block';
  el.innerHTML='<span style="color:'+p.color+';font-weight:800">'+p.name+'</span>'
    +' <span style="color:#aaa">&#8212; tap a cell to reveal</span>';
}

function addLog(player,action,time){
  logs.push({n:player.name,col:player.color,action:action,time:time});
  var box=document.getElementById('log');
  box.innerHTML=logs.slice(-4).reverse().map(function(m,i){
    return '<div style="color:'+m.col+';opacity:'+(1-i*0.2).toFixed(1)+'">['+m.time+'s] <b>'+m.n+'</b>: '+m.action+'</div>';
  }).join('');
}

// ── SAVE ──
function saveResults(winnerName,elapsed){
  lobby.forEach(function(p){
    ensureUser(p.name);
    var isW=p.name===winnerName;
    var score=isW?Math.max(1000-elapsed*2,100):0;
    DB.users[p.name].attempts.unshift({date:new Date().toLocaleDateString(),difficulty:cfg.difficulty,time:elapsed,score:score,won:isW});
    if(DB.users[p.name].attempts.length>20) DB.users[p.name].attempts=DB.users[p.name].attempts.slice(0,20);
    if(isW&&(!DB.users[p.name].highScore||score>DB.users[p.name].highScore)) DB.users[p.name].highScore=score;
  });
  if(winnerName){
    var score=Math.max(1000-elapsed*2,100);
    DB.globalScores.push({name:winnerName,score:score,difficulty:cfg.difficulty,time:elapsed,date:new Date().toLocaleDateString()});
    DB.globalScores.sort(function(a,b){return b.score-a.score;});
    if(DB.globalScores.length>50) DB.globalScores=DB.globalScores.slice(0,50);
  }
}

// ── SCORES ──
function renderScores(){
  var gs=document.getElementById('global-sc');
  if(!DB.globalScores.length){
    gs.innerHTML='<p class="no-data">No scores yet &#8212; play a game!</p>';
  } else {
    var medal=function(i){return i===0?'gold':i===1?'silver':i===2?'bronze':'';};
    gs.innerHTML='<table class="stab"><tr><th>#</th><th>Player</th><th>Score</th><th>Mode</th><th>Time</th></tr>'
      +DB.globalScores.slice(0,20).map(function(s,i){
        return '<tr><td class="'+medal(i)+'">#'+(i+1)+'</td>'
          +'<td style="color:#fff;font-weight:600">'+s.name+'</td>'
          +'<td style="color:var(--accent);font-weight:700">'+s.score+'</td>'
          +'<td style="color:#888">'+s.difficulty+'</td>'
          +'<td style="color:#888">'+s.time+'s</td></tr>';
      }).join('')+'</table>';
  }
  var ps=document.getElementById('player-sc');
  var users=Object.entries(DB.users);
  if(!users.length){ps.innerHTML='<p class="no-data">No players yet.</p>';return;}
  ps.innerHTML=users.map(function(entry){
    var name=entry[0],data=entry[1];
    return '<div class="pcard">'
      +'<div class="pcard-hd"><span style="color:#fff;font-weight:700;font-size:15px">'+name+'</span>'
      +'<span style="color:var(--accent);font-size:12px">Best: '+(data.highScore||'&#8212;')+'</span></div>'
      +(!data.attempts.length?'<p class="no-data" style="font-size:12px">No attempts yet.</p>':
        data.attempts.slice(0,5).map(function(a){
          return '<div class="arow">'
            +'<span style="color:'+(a.won?'var(--ok)':'var(--danger)')+'">'+( a.won?'WIN':'LOSS')+'</span>'
            +'<span>'+a.difficulty+'</span><span>'+a.time+'s</span>'
            +'<span style="color:var(--accent)">'+a.score+'pts</span>'
            +'<span style="color:#555">'+a.date+'</span></div>';
        }).join('')
      )+'</div>';
  }).join('');
}

// ── INIT ──
renderKnown();
</script>
